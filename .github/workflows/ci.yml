name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Enable pnpm
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare pnpm@11.12.0 --activate
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
