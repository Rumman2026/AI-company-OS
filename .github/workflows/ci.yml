name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Enable pnpm
        run: |
          npm install --global corepack@latest
          corepack enable
          corepack prepare pnpm@11.12.0 --activate
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # Scoped to apps/greencal-website only — no other workspace has a
      # real build or test suite yet (see DECISIONS.md ADR-0004). This is
      # not repo-wide build/test coverage.
      - run: pnpm --filter @ai-company-os/greencal-website run build
      - run: pnpm --filter @ai-company-os/greencal-website exec playwright install --with-deps chromium
      - run: pnpm --filter @ai-company-os/greencal-website run test
